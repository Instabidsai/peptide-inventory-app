name: Uptime Monitor

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  uptime-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check app.thepeptideai.com (HTTP + Content)
        id: check_site
        run: |
          # Fetch the full page body (not just headers)
          HTTP_STATUS=$(curl -so /tmp/page.html -w "%{http_code}" --max-time 30 "https://app.thepeptideai.com" 2>/dev/null || echo "000")
          RESPONSE_TIME=$(curl -so /dev/null -w "%{time_total}" --max-time 30 "https://app.thepeptideai.com" 2>/dev/null || echo "timeout")

          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "response_time=$RESPONSE_TIME" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

          # Content check: does the page have the expected title?
          BASELINE_OK="false"
          if grep -q "ThePeptideAI" /tmp/page.html 2>/dev/null; then
            BASELINE_OK="true"
          fi

          # Crash check: does the page show the boot sentinel fallback?
          # Note: We strip <script> tags first because the sentinel JS source
          # contains "temporary issue" as a string literal. We only want to
          # detect it when it's been rendered into the DOM (actual crash).
          CRASH_DETECTED="false"
          if sed '/<script/,/<\/script>/d' /tmp/page.html | grep -q "temporary issue" 2>/dev/null; then
            CRASH_DETECTED="true"
          fi

          echo "baseline_ok=$BASELINE_OK" >> $GITHUB_OUTPUT
          echo "crash_detected=$CRASH_DETECTED" >> $GITHUB_OUTPUT

          # Determine overall status
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "site_down=true" >> $GITHUB_OUTPUT
            echo "failure_reason=HTTP $HTTP_STATUS" >> $GITHUB_OUTPUT
          elif [ "$CRASH_DETECTED" = "true" ]; then
            echo "site_down=true" >> $GITHUB_OUTPUT
            echo "failure_reason=Boot sentinel crash page detected (JS bundle failed)" >> $GITHUB_OUTPUT
          elif [ "$BASELINE_OK" = "false" ]; then
            echo "site_down=true" >> $GITHUB_OUTPUT
            echo "failure_reason=Page content missing (empty response)" >> $GITHUB_OUTPUT
          else
            echo "site_down=false" >> $GITHUB_OUTPUT
            echo "failure_reason=none" >> $GITHUB_OUTPUT
          fi

          # Summary
          echo "## Uptime Check Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://app.thepeptideai.com |" >> $GITHUB_STEP_SUMMARY
          echo "| HTTP Status | $HTTP_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Response Time | ${RESPONSE_TIME}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Content Present | $BASELINE_OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Crash Detected | $CRASH_DETECTED |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

      - name: Check Supabase connectivity
        id: check_supabase
        run: |
          SB_STATUS=$(curl -sI -o /dev/null -w "%{http_code}" --max-time 15 "https://mckkegmkpqdicudnfhor.supabase.co/rest/v1/" -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ja2tlZ21rcHFkaWN1ZG5maG9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0OTIxMTcsImV4cCI6MjA4NDA2ODExN30.Amo1Aw6I_JnDGiSmfoIhkcBmemkKl73kcfuHAPdX_rU" 2>/dev/null || echo "000")
          echo "supabase_status=$SB_STATUS" >> $GITHUB_OUTPUT
          echo "| Supabase API | $SB_STATUS |" >> $GITHUB_STEP_SUMMARY
          if [ "$SB_STATUS" != "200" ]; then
            echo "::warning::Supabase returned HTTP $SB_STATUS"
          fi

      - name: Auto-rollback if site is down
        if: steps.check_site.outputs.site_down == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "::error::SITE DOWN — ${{ steps.check_site.outputs.failure_reason }}"

          # Only attempt rollback if we have Vercel credentials
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_TOKEN or VERCEL_PROJECT_ID not set — cannot auto-rollback"
            exit 1
          fi

          TEAM_PARAM=""
          if [ -n "$VERCEL_TEAM_ID" ]; then
            TEAM_PARAM="&teamId=$VERCEL_TEAM_ID"
          fi

          # Get the last 5 production deployments
          DEPLOYMENTS=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=5&state=READY${TEAM_PARAM}" \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          # Extract the second deployment (first = current broken one)
          ROLLBACK_UID=$(echo "$DEPLOYMENTS" | jq -r '.deployments[1].uid // empty')
          ROLLBACK_URL=$(echo "$DEPLOYMENTS" | jq -r '.deployments[1].url // empty')

          if [ -z "$ROLLBACK_UID" ]; then
            echo "::error::No previous deployment found to roll back to"
            exit 1
          fi

          echo "Rolling back to deployment: $ROLLBACK_UID ($ROLLBACK_URL)"

          # Promote the previous deployment
          PROMOTE_TEAM=""
          if [ -n "$VERCEL_TEAM_ID" ]; then
            PROMOTE_TEAM="?teamId=$VERCEL_TEAM_ID"
          fi

          PROMOTE_RESULT=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.vercel.com/v13/deployments/${ROLLBACK_UID}/promote${PROMOTE_TEAM}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json")

          PROMOTE_STATUS=$(echo "$PROMOTE_RESULT" | tail -1)

          echo "## Auto-Rollback" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ steps.check_site.outputs.failure_reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rollback Target | $ROLLBACK_UID |" >> $GITHUB_STEP_SUMMARY
          echo "| Promote Status | $PROMOTE_STATUS |" >> $GITHUB_STEP_SUMMARY

          if [ "$PROMOTE_STATUS" = "200" ] || [ "$PROMOTE_STATUS" = "202" ]; then
            echo "✅ Auto-rollback successful"
          else
            echo "::error::Auto-rollback failed (HTTP $PROMOTE_STATUS)"
            exit 1
          fi
