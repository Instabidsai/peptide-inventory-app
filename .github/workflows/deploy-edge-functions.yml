name: Deploy Edge Functions

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref $PROJECT_ID --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy all edge functions
        run: |
          functions=(
            admin-ai-chat
            admin-impersonate
            ai-builder
            analyze-food
            boot-failure
            chat-with-ai
            check-low-supply
            check-payment-emails
            code-patcher
            composio-callback
            composio-connect
            create-supplier-order
            deploy-webhook
            exchange-token
            fulfill-order
            health-digest
            health-probe
            invite-user
            meta-sentinel
            notify-commission
            partner-ai-chat
            process-health-document
            promote-contact
            provision-tenant
            run-automations
            scrape-brand
            scrape-brand-status
            self-signup
            send-email
            sentinel-worker
            shopify-sync-customers
            shopify-sync-products
            shopify-webhook
            sms-webhook
            sync-discount-codes
            synthetic-monitor
            telegram-webhook
            textbelt-webhook
            woo-callback
            woo-connect
            woo-manual-connect
            woo-sync-customers
            woo-sync-products
            woo-webhook
          )
          for fn in "${functions[@]}"; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" --no-verify-jwt || echo "WARN: $fn deploy failed"
          done
          echo "All functions deployed."
